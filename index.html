<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EvanYork's APP</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        h1 { color: #00e676; }
        .app-card { 
            display: inline-block; width: 250px; margin: 20px; padding: 20px; 
            background: #1e1e1e; border-radius: 15px; border: 2px solid #333;
            text-decoration: none; color: white; transition: 0.3s;
            vertical-align: top;
        }
        /* 模拟遥控器选中效果：发光且放大 */
        .app-card:focus, .app-card:hover { 
            outline: none;
            border-color: #00e676; 
            transform: scale(1.1); 
            background: #262626;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
        }
        .version { font-size: 0.8em; color: #aaa; margin-top: 10px; }
        h3 { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>EvanYork's APP 专用分发中心</h1>
    <p>点击下方卡片直接下载到 Google TV</p>

    <a class="app-card" id="clash_link" href="#">
        <h3>Clash Meta</h3>
        <div id="clash_ver" class="version">正在获取最新版...</div>
    </a>

    <a class="app-card" id="qiyi_link" href="#">
        <h3>银河奇异果</h3>
        <div class="version">爱奇艺 TV 版</div>
    </a>

    <a class="app-card" id="jiguang_link" href="#">
        <h3>云视听极光</h3>
        <div class="version">腾讯视频 TV 版</div>
    </a>

    <a class="app-card" id="kumiao_link" href="#">
        <h3>酷喵</h3>
        <div class="version">优酷 TV 版</div>
    </a>

    <a class="app-card" id="bili_link" href="#">
        <h3>云视听小电视</h3>
        <div class="version">Bilibili TV 版</div>
    </a>

    <a class="app-card" id="tivi_link" href="#">
        <h3>TiviMate</h3>
        <div class="version">IPTV 播放器</div>
    </a>

    <script>
        // 自动聚焦第一个，方便遥控器操作
        window.onload = function() {
            document.querySelector('.app-card').focus();
        };
    </script>
</body>
</html>
