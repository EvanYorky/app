name: Auto Update APK Links

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动执行
  workflow_dispatch: # 允许你手动点击运行

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Latest ClashMeta Link
        run: |
          # 抓取 GitHub Release 的最新下载地址 (过滤出 armeabi-v7a 架构)
          CLASH_URL=$(curl -s https://api.github.com/repos/MetaCubeX/ClashMetaForAndroid/releases/latest | grep "browser_download_url" | grep "armeabi-v7a" | cut -d '"' -f 4 | head -n 1)
          CLASH_TAG=$(curl -s https://api.github.com/repos/MetaCubeX/ClashMetaForAndroid/releases/latest | grep "tag_name" | cut -d '"' -f 4)
          echo "CLASH_URL=$CLASH_URL" >> $GITHUB_ENV
          echo "CLASH_TAG=$CLASH_TAG" >> $GITHUB_ENV

      - name: Update HTML File
        run: |
          # 1. 处理 ClashMeta (动态抓取)
          sed -i "s|id=\"clash_link\" href=\"[^\"]*\"|id=\"clash_link\" href=\"${{ env.CLASH_URL }}\"|g" index.html
          sed -i "s|id=\"clash_ver\"[^>]*>[^<]*<|id=\"clash_ver\" class=\"version\">版本: ${{ env.CLASH_TAG }}<|g" index.html

          # 2. 处理国内 App 及常用工具 (官方定向链接)
          # 银河奇异果
          sed -i "s|id=\"qiyi_link\" href=\"[^\"]*\"|id=\"qiyi_link\" href=\"https://app.iqiyi.com/tv/player/index.html\"|g" index.html
          
          # 云视听极光
          sed -i "s|id=\"jiguang_link\" href=\"[^\"]*\"|id=\"jiguang_link\" href=\"https://v.qq.com/download.html#tv\"|g" index.html
          
          # 酷喵
          sed -i "s|id=\"kumiao_link\" href=\"[^\"]*\"|id=\"kumiao_link\" href=\"https://mobile.youku.com/index/pc\"|g" index.html
          
          # 云视听小电视
          sed -i "s|id=\"bili_link\" href=\"[^\"]*\"|id=\"bili_link\" href=\"https://app.bilibili.com/general/apk/download?appkey=1\&build=0\&mobi_app=android_tv_yst\"|g" index.html
          
          # TiviMate
          sed -i "s|id=\"tivi_link\" href=\"[^\"]*\"|id=\"tivi_link\" href=\"https://tivimate.com/tivimate.apk\"|g" index.html

      - name: Commit and Push
        run: |
          git config --global user.name "YUNF-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "Auto-update: All APK links" || exit 0
          git push
