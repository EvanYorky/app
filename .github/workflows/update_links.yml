name: Auto Update APK Links

on:
  schedule:
    - cron: '0 0 * * *' # 每天早上8点执行
  workflow_dispatch: 

jobs:
  update-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Links via Python
        shell: python
        run: |
          import urllib.request
          import json
          import re
          import os

          # 1. 抓取 ClashMeta (v7a)
          try:
              req = urllib.request.Request("https://api.github.com/repos/MetaCubeX/ClashMetaForAndroid/releases/latest")
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  clash_tag = data['tag_name']
                  clash_url = ""
                  for asset in data['assets']:
                      if 'armeabi-v7a' in asset['browser_download_url']:
                          clash_url = asset['browser_download_url']
                          break
          except Exception as e:
              print(f"Error fetching Clash: {e}")
              clash_url, clash_tag = "", ""

          # 2. 构造国内 App 的当贝直链 (ID是固定的，这样最稳)
          # 1=奇异果, 2=极光, 3=酷喵, 1484=小电视
          mapping = {
              'clash_link': clash_url,
              'qiyi_link': "https://down.znds.com/getdownurl/?s=1",
              'jiguang_link': "https://down.znds.com/getdownurl/?s=2",
              'kumiao_link': "https://down.znds.com/getdownurl/?s=3",
              'bili_link': "https://down.znds.com/getdownurl/?s=1484"
          }

          # 3. 读取并更新 index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # 替换所有 href
          for id_val, url in mapping.items():
              if url:
                  # 匹配 id="xxx" 后面跟着的 href="..."，不论中间有多少空格或换行
                  pattern = rf'(id="{id_val}"\s+href=")[^"]*(")'
                  content = re.sub(pattern, rf'\1{url}\2', content)

          # 替换 Clash 版本文字
          if clash_tag:
              content = re.sub(r'(id="clash_ver"[^>]*>)[^<]*(<)', rf'\1版本: {clash_tag}\2', content)

          # 4. 写回文件
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)

      - name: Commit and Push
        run: |
          git config --global user.name "YUNF-Bot"
          git config --global user.email "bot@github.com"
          git add index.html
          git commit -m "Auto-update: Links via Python Direct Logic" || exit 0
          git push
